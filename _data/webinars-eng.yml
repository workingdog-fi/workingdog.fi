title: "SAR Dog Training Webinars"
description: "Webinars on SAR dog training, for handlers at every level. Each one below has its own application or registration — pick the one you want."

webinars:
  - title: "Inside the Indication — Saturday 30 May 2026"
    image: "/assets/images/webinars/inside-the-indication.jpg"
    description: "Paid 90-min flagship webinar on the 9 skills underneath a reliable indication. Apply-first."
    topics:
      - "Why indication problems are usually structural, not motivational"
      - "The 9 skills the indication chain rests on (recall/stay/heel are general handling, not in this diagnostic)"
      - "Two-stage diagnosis: decompose the chain, then apply don't-know / no-motivation / not-healthy to the broken link"
      - "The trap of correction without structure — how it trains the mistake into the chain"
      - "How to use the framework on your own dog the next training day"
    duration: "90 minutes"
    level: "Working handlers + instructors"
    url: "/9skills-webinar/"
    cta_text: "Apply for a seat"

  - title: "False Indications: Understanding and Prevention"
    image: "/assets/images/webinars/false-indications.jpg"
    description: "Why SAR dogs throw false indications, and how to cut them down. This webinar covers:"
    topics:
      - "Common causes of false indications in search scenarios"
      - "Environmental factors that trigger false alerts"
      - "Training techniques to minimize false positives"
      - "Reinforcement strategies for accurate indications"
      - "Case studies from real SAR operations"
    duration: "2 hours"
    level: "Intermediate to Advanced"
    url: "https://docs.google.com/forms/d/e/1FAIpQLScLHrYHinsfAszmY1SFmEUNj369RQPab3jOtGueakcQEk2k7w/viewform"
    cta_text: "Express interest"

  - title: "Reward Schedules: Optimizing Training Effectiveness"
    image: "/assets/images/webinars/reward-schedules.jpg"
    description: "How reward schedules shape what your dog learns and how hard it works. Topics include:"
    topics:
      - "Understanding fixed vs. variable reinforcement schedules"
      - "Timing and frequency of rewards for optimal learning"
      - "Transitioning from continuous to intermittent reinforcement"
      - "Maintaining motivation in extended search scenarios"
      - "Adapting schedules for different training phases"
    duration: "2.5 hours"
    level: "All levels"
    url: "https://docs.google.com/forms/d/e/1FAIpQLScLHrYHinsfAszmY1SFmEUNj369RQPab3jOtGueakcQEk2k7w/viewform"
    cta_text: "Express interest"

  - title: "Mastering Barking Indication"
    image: "/assets/images/webinars/barking-indication.jpg"
    description: "Building a barking indication that holds up under real search conditions. This webinar covers:"
    topics:
      - "Building foundation behaviors for bark indication"
      - "Techniques for sustained, confident barking"
      - "Troubleshooting common barking issues"
      - "Proofing the indication in various environments"
      - "Integration with search patterns and victim location"
    duration: "3 hours"
    level: "Beginner to Intermediate"
    url: "https://docs.google.com/forms/d/e/1FAIpQLScLHrYHinsfAszmY1SFmEUNj369RQPab3jOtGueakcQEk2k7w/viewform"
    cta_text: "Express interest"