
# _config.yml
title: "Vadim Likholetov - SAR Officer & Dog Handler"
description: "Professional SAR Officer with 15+ years experience in Search and Rescue operations and dog handling"
baseurl: ""
url: "https://workingdog.fi"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Site settings
author:
  name: "Vadim Likholetov"
  email: "vadikas@workingdog.fi"
  phone: "+358 50 3052224"
  location: "Tampere, Finland"
  portrait: "/assets/images/portrait.png"

# SAR Statistics
stats:
  experience_years: 15
  sar_calls: "2000+"
  sar_dogs: 4

# Collections
collections:
  dogs:
    output: false
  deployments:
    output: false
  certifications:
    output: false
  judging:
    output: true
    permalink: /judging/:name/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
