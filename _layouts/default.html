<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    {% comment %} Open Graph + Twitter Card — auto-generated from page frontmatter when present {% endcomment %}
    <meta property="og:title" content="{{ page.og_title | default: page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.og_description | default: page.description | default: site.description }}">
    <meta property="og:type" content="{{ page.og_type | default: 'website' }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    {% if page.og_image %}<meta property="og:image" content="{{ page.og_image | absolute_url }}">{% endif %}
    <meta property="og:locale" content="{{ page.lang | default: 'en' }}_{{ page.region | default: 'US' }}">
    <meta property="og:site_name" content="WorkingDog.fi">
    <meta name="twitter:card" content="{% if page.og_image %}summary_large_image{% else %}summary{% endif %}">
    <meta name="twitter:title" content="{{ page.og_title | default: page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.og_description | default: page.description | default: site.description }}">
    {% if page.og_image %}<meta name="twitter:image" content="{{ page.og_image | absolute_url }}">{% endif %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    {% include navigation.html %}
    {{ content }}
    {% include footer.html %}
</body>
</html>
